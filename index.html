<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reaction Trainer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-container">
    <h1>Reaction Time Game</h1>

    <!-- This text changes based on the game state. -->
    <p id="status-text">Click Start</p>

    <!-- Start button begins a round. -->
    <button id="start-btn" type="button">Start</button>

    <!-- Large clickable area for the reaction challenge. -->
    <div id="click-area" role="button" aria-label="Reaction area" tabindex="0"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
